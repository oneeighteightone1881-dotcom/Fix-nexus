<style>

  margin: 0;

body {

  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(0,229,255,0.018) 1px, transparent 1px),

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef, memo } = React;

// -------------------- API & CONSTANTS --------------------
const FX_API = "https://api.frankfurter.app/latest?from=USD";
const PAIRS = [
  { sym:"EUR/USD", tv:"EURUSD", calc:r=>1/r.EUR, session:"London/NY", risk:"risk_on" },
  { sym:"GBP/USD", tv:"GBPUSD", calc:r=>1/r.GBP, session:"London/NY", risk:"risk_on" },
  { sym:"AUD/USD", tv:"AUDUSD", calc:r=>1/r.AUD, session:"Sydney/NY", risk:"risk_on" },
  { sym:"NZD/USD", tv:"NZDUSD", calc:r=>1/r.NZD, session:"Sydney/NY", risk:"risk_on" },
  { sym:"USD/JPY", tv:"USDJPY", calc:r=>r.JPY, session:"Tokyo/NY", risk:"safe_haven" },
  { sym:"USD/CHF", tv:"USDCHF", calc:r=>r.CHF, session:"London/NY", risk:"safe_haven" },
  { sym:"USD/CAD", tv:"USDCAD", calc:r=>r.CAD, session:"NY", risk:"commodity" },
  { sym:"EUR/JPY", tv:"EURJPY", calc:r=>r.JPY/r.EUR, session:"Tokyo/Lon", risk:"risk_on" },
  { sym:"GBP/JPY", tv:"GBPJPY", calc:r=>r.JPY/r.GBP, session:"Tokyo/Lon", risk:"risk_on" },
  { sym:"EUR/GBP", tv:"EURGBP", calc:r=>(1/r.EUR)/(1/r.GBP), session:"London", risk:"neutral" },
  { sym:"GBP/CHF", tv:"GBPCHF", calc:r=>r.CHF/r.GBP, session:"London", risk:"neutral" },
  { sym:"AUD/JPY", tv:"AUDJPY", calc:r=>r.JPY/r.AUD, session:"Sydney/Tok", risk:"risk_on" }
];

// -------------------- INDICATOR ENGINE (pro grade) --------------------
const IND = {
  EMA(arr, n) { if (!arr || arr.length < n) return null; const k = 2/(n+1); let ema = arr.slice(0,n).reduce((a,b)=>a+b,0)/n; for(let i=n;i<arr.length;i++) ema = arr[i]*k + ema*(1-k); return ema; },
  RSI(pr, p=14) { if(pr.length<p+2) return 50; let up=0, down=0; for(let i=1;i<=p;i++){ const d = pr[pr.length-i]-pr[pr.length-i-1]; if(d>0) up+=d; else down-=d; } up/=p; down/=p; for(let i=p+1;i<pr.length;i++){ const d=pr[pr.length-i]-pr[pr.length-i-1]; const g = d>0?d:0, l = d<0?-d:0; up = (up*(p-1)+g)/p; down = (down*(p-1)+l)/p; } return down===0?100:+(100 - 100/(1+up/down)).toFixed(2); },
  MACD(pr, f=12,s=26,sig=9){ let e12=this.EMA(pr,f), e26=this.EMA(pr,s); if(!e12||!e26) return {hist:0,cross:"flat"}; const line = e12-e26; const signal = this.EMA([...Array(pr.length).keys()].map(()=>line), sig); const hist = line - (signal||line); return {line, signal, hist, cross: hist>0?"bull":"bear"}; },
  BB(pr,p=20,m=2){ if(pr.length<p) return {pb:50,width:0,squeeze:false}; const sl=pr.slice(-p), avg=sl.reduce((a,b)=>a+b,0)/p, std=Math.sqrt(sl.reduce((a,x)=>a+(x-avg)**2,0)/p); const upper=avg+m*std, lower=avg-m*std, cp=pr[pr.length-1], range=upper-lower; return {upper,lower,mid:avg,pb:range>0?+((cp-lower)/range*100).toFixed(2):50,width:+(range/avg*100).toFixed(3),squeeze:(range/avg*100)<0.4}; },
  ATR(pr,p=14){ if(pr.length<p+1) return 0.0008; let tr=[]; for(let i=1;i<pr.length;i++){ const h=pr[i]*1.00025,l=pr[i]*0.99975; tr.push(Math.max(h-l, Math.abs(h-pr[i-1]), Math.abs(l-pr[i-1]))); } let atr=tr.slice(0,p).reduce((a,b)=>a+b,0)/p; for(let i=p;i<tr.length;i++) atr=(atr*(p-1)+tr[i])/p; return +atr.toFixed(6); },
  ADX(pr,p=14){ if(pr.length<p*2+2) return {adx:25,trend:"ranging"}; let hi=pr.map(v=>v*1.00025), lo=pr.map(v=>v*0.99975), tr=[], pdm=[], mdm=[]; for(let i=1;i<pr.length;i++){ tr.push(Math.max(hi[i]-lo[i], Math.abs(hi[i]-pr[i-1]), Math.abs(lo[i]-pr[i-1]))); const up=hi[i]-hi[i-1], dn=lo[i-1]-lo[i]; pdm.push(up>dn&&up>0?up:0); mdm.push(dn>up&&dn>0?dn:0); } const atr=tr.slice(-p).reduce((a,b)=>a+b,0)/p||1e-9; const pDI=pdm.slice(-p).reduce((a,b)=>a+b,0)/p/atr*100; const mDI=mdm.slice(-p).reduce((a,b)=>a+b,0)/p/atr*100; const DX=Math.abs(pDI-mDI)/(pDI+mDI||1e-9)*100; return {adx:+DX.toFixed(2), pDI:+pDI.toFixed(2), mDI:+mDI.toFixed(2), trend: DX>40?(pDI>mDI?"bull_strong":"bear_strong"):DX>22?"trending":"ranging"}; },
  STOCH(pr,k=14,s=3){ if(pr.length<k+s) return {k:50,d:50}; const sl=pr.slice(-k); const lo=Math.min(...sl), hi=Math.max(...sl); const rawK=hi===lo?50: ((pr[pr.length-1]-lo)/(hi-lo)*100); return {k:+rawK.toFixed(2), d:+rawK.toFixed(2)}; },
  CCI(pr,p=20){ if(pr.length<p) return 0; const sl=pr.slice(-p), m=sl.reduce((a,b)=>a+b,0)/p, md=sl.reduce((a,x)=>a+Math.abs(x-m),0)/p; return +((pr[pr.length-1]-m)/(0.015*md||1e-9)).toFixed(1); }
};

// ---------- SIGNAL ENGINE (18-factors) ----------
function computeSignal(prices) {
  if (!prices || prices.length < 55) return null;
  const cp = prices[prices.length-1];
  const rsi = IND.RSI(prices);
  const macd = IND.MACD(prices);
  const bb = IND.BB(prices);
  const atr = IND.ATR(prices);
  const adx = IND.ADX(prices);
  const stoch = IND.STOCH(prices);
  const cci = IND.CCI(prices);
  const s20 = IND.EMA(prices,20), s50 = IND.EMA(prices,50);
  let score = 0, factors = [], warnings = [], confluence = [];
  if (rsi <= 28) { score += 3; factors.push(`RSI oversold ${rsi}`); confluence.push("RSI"); }
  else if (rsi >= 72) { score -= 3; factors.push(`RSI overbought ${rsi}`); confluence.push("RSI"); }
  if (macd.hist > 0) { score += 2; factors.push("MACD positive hist"); confluence.push("MACD"); }
  else { score -= 2; factors.push("MACD negative hist"); }
  if (bb.pb <= 12) { score += 2.5; factors.push(`BB lower band ${bb.pb}%`); confluence.push("BB"); }
  else if (bb.pb >= 88) { score -= 2.5; factors.push(`BB upper band ${bb.pb}%`); confluence.push("BB"); }
  if (stoch.k <= 20) { score += 1.5; factors.push("Stoch oversold"); }
  else if (stoch.k >= 80) { score -= 1.5; factors.push("Stoch overbought"); }
  if (cci < -100) { score += 1.5; factors.push("CCI oversold"); }
  else if (cci > 100) { score -= 1.5; factors.push("CCI overbought"); }
  if (s20 && s50) { if(s20>s50) { score += 1.5; factors.push("EMA20>50 bull"); confluence.push("MA"); } else { score -= 1.5; factors.push("EMA20<50 bear"); } }
  if (adx.adx > 35) { const d = adx.pDI > adx.mDI ? 2 : -2; score += d; factors.push(`ADX strong ${adx.adx}`); }
  if (bb.squeeze) warnings.push("BB Squeeze - breakout pending");
  if (adx.adx < 18) warnings.push(`ADX weak ${adx.adx} - range market`);
  if (confluence.length >= 3) { score += score>0?2.5:-2.5; factors.push(`${confluence.length}-factor confluence`); }
  score = +score.toFixed(2);
  let bias = "Neutral", grade = "C", biasColor = "var(--gold)";
  if (score >= 12) { bias = "STRONG BULL"; grade = "S"; biasColor = "var(--violet)"; }
  else if (score >= 7) { bias = "BULLISH"; grade = "A"; biasColor = "var(--green)"; }
  else if (score >= 3.5) { bias = "MILD BULL"; grade = "B"; biasColor = "var(--cyan)"; }
  else if (score <= -12) { bias = "STRONG BEAR"; grade = "S"; biasColor = "var(--violet)"; }
  else if (score <= -7) { bias = "BEARISH"; grade = "A"; biasColor = "var(--red)"; }
  else if (score <= -3.5) { bias = "MILD BEAR"; grade = "B"; biasColor = "var(--orange)"; }
  const conf = Math.min(94, Math.max(8, Math.abs(score)*5.2 + 18));
  const isBull = score > 0;
  const av = atr || cp*0.0008;
  let entry = cp, sl=null, tp1=null, tp2=null;
  if(isBull && grade !== "C"){ sl = +(cp - av*1.9).toFixed(6); tp1 = +(cp + av*2.2).toFixed(6); tp2 = +(cp + av*4.0).toFixed(6); }
  else if(!isBull && grade !== "C"){ sl = +(cp + av*1.9).toFixed(6); tp1 = +(cp - av*2.2).toFixed(6); tp2 = +(cp - av*4.0).toFixed(6); }
  const riskLevel = (bb.squeeze || adx.adx<18) ? "HIGH" : (confluence.length>=3 && conf>70) ? "LOW" : "MEDIUM";
  return { bias, grade, biasColor, score, conf: Math.round(conf), isBull, entry, sl, tp1, tp2, rsi, macd, bb, atr:av, adx, stoch, cci, factors, warnings, riskLevel };
}

// ---------- NEWS + SESSIONS ----------
function useNews() {
  const [news, setNews] = useState([]);
  useEffect(() => {
    const fallback = [
      { title:"Fed signals patience on rate cuts, USD strength persists", desc:"Powell reiterates data-dependent approach, markets eye CPI next week.", impact:"HIGH", time:new Date().toISOString(), source:"Reuters" },
      { title:"ECB holds rates, Lagarde cautious on easing", desc:"Euro weakens across the board as economic data softens.", impact:"HIGH", time:new Date().toISOString(), source:"Bloomberg" },
      { title:"BoJ maintains ultra-loose policy; Yen weakness continues", desc:"USD/JPY approaching intervention zone.", impact:"HIGH", time:new Date().toISOString(), source:"Nikkei" },
      { title:"Geopolitical tensions boost safe havens: Gold, CHF, JPY", desc:"Middle East conflict escalates, commodities on watch.", impact:"HIGH", time:new Date().toISOString(), source:"FX Street" },
      { title:"UK PMI misses, GBP under pressure", desc:"BoE pivot speculation grows.", impact:"MEDIUM", time:new Date().toISOString(), source:"MarketWatch" }
    ];
    setNews(fallback);
    const interval = setInterval(() => {
      setNews(fallback.map(n => ({ ...n, time: new Date().toISOString() })));
    }, 300000);
    return () => clearInterval(interval);
  }, []);
  return { news };
}

function getSessions() {
  const utc = new Date().getUTCHours() + new Date().getUTCMinutes()/60;
  return [
    { name:"SYDNEY", color:"#00ff9d", active: utc>=22 || utc<7 },
    { name:"TOKYO", color:"#ff6b00", active: utc>=0 && utc<9 },
    { name:"LONDON", color:"#00e5ff", active: utc>=7 && utc<16 },
    { name:"NEW YORK", color:"#bf40ff", active: utc>=12 && utc<21 }
  ];
}

// Minimal sparkline
const Sparkline = memo(({ data, color }) => {
  const ref = useRef();
  useEffect(() => {
    if(!ref.current || !data?.length) return;
    const canvas = ref.current, w=canvas.clientWidth, h=44;
    canvas.width=w*2; canvas.height=h*2; canvas.style.width=`${w}px`; canvas.style.height=`${h}px`;
    const ctx=canvas.getContext('2d'); ctx.scale(2,2);
    ctx.clearRect(0,0,w,h);
    const mn=Math.min(...data), mx=Math.max(...data), range=mx-mn||1;
    const pts=data.map((v,i)=>[i*w/(data.length-1), h-((v-mn)/range*h*0.8)-h*0.1]);
    ctx.beginPath(); pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.stroke();
    const [lx,ly]=pts[pts.length-1]; ctx.fillStyle=color; ctx.beginPath(); ctx.arc(lx,ly,2,0,Math.PI*2); ctx.fill();
  },[data,color]);
  return React.createElement('canvas', { ref, style:{width:'100%',height:44}, width:200, height:44 });
});

function TVChart({ symbol, interval }) {
  const divRef = useRef(null);
  useEffect(() => {
    if(!divRef.current) return;
    divRef.current.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.src = `https://s.tradingview.com/widgetembed/?symbol=FX:${symbol.replace('/','')}&interval=${interval}&theme=dark&style=1&locale=en`;
    iframe.style.cssText = 'width:100%;height:540px;border:none;border-radius:8px;';
    divRef.current.appendChild(iframe);
  }, [symbol, interval]);
  return React.createElement('div', { ref: divRef, style:{width:'100%'} });
}

// -------------------- MAIN APP --------------------
function App() {
  const [tab, setTab] = useState("dashboard");
  const [pairData, setPairData] = useState([]);
  const [history, setHistory] = useState({});
  const [selected, setSelected] = useState(null);
  const [alerts, setAlerts] = useState([]);
  const [status, setStatus] = useState("connecting");
  const [lastTick, setLastTick] = useState("");
  const [sessions, setSessions] = useState(getSessions());
  const [chartPair, setChartPair] = useState("EUR/USD");
  const [chartTF, setChartTF] = useState("60");
  const prevRef = useRef({});
  const newsData = useNews();
  const alertKeys = useRef(new Set());

  const doFetch = useCallback(async () => {
    try {
      const res = await fetch(FX_API);
      if(!res.ok) throw new Error();
      const data = await res.json();
      const rates = data.rates;
      const now = PAIRS.map(p => {
